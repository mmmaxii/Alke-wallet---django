{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlkeWallet</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'alkewallet/img/favicon.ico' %}">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" />
    <!-- FontAwesome for the eye icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="{% static 'alkewallet/css/index.css' %}" />
  </head>

  <body class="bg-gradient-purple">
    <div class="container">
      <div class="row justify-content-center align-items-center vh-100">
        <div class="col-12 col-sm-10 col-md-6">
          <div class="card shadow-sm animate__animated animate__fadeIn animate__faster" style="animation-duration: 0.6s;">
            <div class="card-body">
              <h2 class="text-center mb-4">Crear Cuenta</h2>

              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger text-center" role="alert" style="padding: 0.5rem; border-radius: 8px;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}

              <form method="POST" action="{% url 'registro' %}">
                {% csrf_token %}
                <div class="form-group">
                  <label for="first_name">Nombre completo:</label>
                  <input type="text" name="first_name" class="form-control" id="first_name" placeholder="Tu nombre" required />
                </div>
                <div class="form-group">
                  <label for="username">Email:</label>
                  <input type="email" name="username" class="form-control" id="username" placeholder="Tu email" required />
                </div>
                <div class="form-group">
                  <label for="password">Contraseña:</label>
                  <div class="input-group">
                    <input type="password" name="password" minlength="8" class="form-control" id="password" placeholder="Crea una contraseña" required />
                    <div class="input-group-append">
                      <span class="input-group-text" onclick="togglePassword('password', 'toggleIconReg')" style="cursor: pointer; background-color: rgba(255,255,255,0.05); border-color: rgba(255, 255, 255, 0.2); color: #3c096c; justify-content: center; width: 45px;">
                        <i id="toggleIconReg" class="fas fa-eye"></i>
                      </span>
                    </div>
                  </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block mt-4">
                  Registrarme
                </button>
              </form>
              <hr style="border-top: 1px solid rgba(255,255,255,0.2);">
              <div class="text-center mt-3">
                <p style="color: white; margin-bottom: 0;">¿Ya tienes cuenta? <br>
                  <a href="{% url 'login' %}" style="color: #00d2ff; font-weight: bold; text-decoration: none;">Inicia sesión aquí</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script>
      function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = "password";
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      }
    </script>
  </body>
</html>
