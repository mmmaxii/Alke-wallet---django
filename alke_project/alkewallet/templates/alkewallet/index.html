{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AlkeWallet</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{% static 'alkewallet/img/favicon.ico' %}">
    <link
      rel="stylesheet"
      rel="stylesheet"
      href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    />
    <!-- FontAwesome for the eye icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />

    <link rel="stylesheet" href="{% static 'alkewallet/css/index.css' %}" />
  </head>

  <body class="bg-gradient-purple">
    <div class="container">
      <div class="row justify-content-center align-items-center vh-100">
        <div class="col-12 col-sm-10 col-md-6">
          <div class="card shadow-sm animate__animated animate__fadeIn animate__faster" style="animation-duration: 0.6s;">
            <div class="card-body">
              <h2 class="text-center mb-4">Alke Wallet</h2>

              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-danger text-center" role="alert" style="padding: 0.5rem; border-radius: 8px;">
                    {{ message }}
                  </div>
                {% endfor %}
              {% endif %}

              <form id="login-form" method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group">
                  <label for="email">Email:</label>
                  <input
                    type="email"
                    name="username"
                    class="form-control"
                    id="email"
                    placeholder="Ingresa tu email"
                    required
                  />
                </div>
                <div class="form-group">
                  <label for="password">Contraseña:</label>
                  <div class="input-group">
                    <input
                      type="password"
                      name="password"
                      minlength="8"
                      required
                      class="form-control"
                      id="password"
                      placeholder="Ingresa tu contraseña"
                    />
                    <div class="input-group-append">
                      <span class="input-group-text" onclick="togglePassword('password', 'toggleIconLogin')" style="cursor: pointer; background-color: rgba(255,255,255,0.05); border-color: rgba(255, 255, 255, 0.2); color: #3c096c; justify-content: center; width: 45px;">
                        <i id="toggleIconLogin" class="fas fa-eye"></i>
                      </span>
                    </div>
                  </div>
                </div>
                <div class="form-group form-check">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    id="rememberMe"
                  />
                  <label class="form-check-label" for="rememberMe"
                    >Recordarme</label
                  >
                </div>
                <button
                  id="btn-ingresar"
                  type="submit"
                  class="btn btn-primary btn-block"
                >
                  Ingresar
                </button>
              </form>
              <hr style="border-top: 1px solid rgba(255,255,255,0.2);">
              <div class="text-center mt-3">
                <p style="color: white; margin-bottom: 0;">¿No tienes cuenta? <br>
                  <a href="{% url 'registro' %}" style="color: #00d2ff; font-weight: bold; text-decoration: none;">Regístrate aquí</a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{% static 'alkewallet/js/index.js' %}"></script>
    <script>
      function togglePassword(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") {
          input.type = "text";
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = "password";
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      }
    </script>
  </body>
</html>
